name: Generate Chat Report

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube ライブ配信(アーカイブ)のURL'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: report-gen
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yt-dlp janome

      - name: Generate report
        run: python run_report.py "${{ github.event.inputs.url }}"

      - name: Rebuild gallery index
        run: python build_index.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add report for ${{ github.event.inputs.url }}" || { echo "no changes"; exit 0; }
          git push
